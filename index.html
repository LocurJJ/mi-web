<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panadería Josué Finanzas</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
    }

    header{
      text-align:center;
      padding:25px;
      background:white;
    }

    .saldo{
      background:#b7f000;
      padding:20px;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
      text-align:center;
    }

    .menu{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:15px;
    }

    button{
      padding:18px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .central{ background:#7fa0c8; }
    .sucursal{ background:yellow; }
    .reparto{ background:pink; }
    .gastos{ background:red; color:white; }
    .verde{ background:#b7f000; }

    .pantalla{
      display:none;
      background:white;
      padding:20px;
      margin:15px;
      border-radius:10px;
    }

    input, select{
      padding:15px;
      font-size:18px;
      margin:8px;
      width:250px;
    }

    .opciones button{
      margin:5px;
      background:#ddd;
    }

    .seleccionado{
      outline:4px solid black;
    }

    .resumen{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:10px;
      padding:15px;
    }

    .card{
      background:white;
      padding:15px;
      text-align:center;
      border-radius:8px;
      font-weight:bold;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      margin-top:20px;
    }

    th, td{
      border:1px solid #ccc;
      padding:10px;
      text-align:center;
    }

    th{
      background:#b7f000;
    }
  </style>
</head>

<body>

<header>
  <h1>Panadería Josué</h1>
  <h2>Finanzas</h2>
</header>

<div class="saldo" onclick="abrirPantalla('saldo')">
  Caja actual: $<span id="saldoActual">0</span>
</div>

<div class="menu">
  <button class="central" onclick="abrirIngreso('Central')">Ingreso Central</button>
  <button class="sucursal" onclick="abrirIngreso('Sucursal')">Ingreso Sucursal</button>
  <button class="reparto" onclick="abrirIngreso('Reparto')">Ingreso Reparto</button>
  <button class="gastos" onclick="abrirPantalla('gasto')">Gastos</button>
</div>

<div class="resumen">
  <div class="card">Central<br>$<span id="totalCentral">0</span></div>
  <div class="card">Sucursal<br>$<span id="totalSucursal">0</span></div>
  <div class="card">Reparto<br>$<span id="totalReparto">0</span></div>
  <div class="card">Gastos<br>$<span id="totalGastos">0</span></div>
  <div class="card">Balance<br>$<span id="totalBalance">0</span></div>
</div>

<div id="pantallaIngreso" class="pantalla">
  <h2 id="tituloIngreso">Ingreso</h2>

  <label>Día</label><br>
  <input type="date" id="diaIngreso"><br>

  <h3>Turno</h3>
  <div class="opciones">
    <button id="turnoManana" onclick="seleccionarTurno('mañana')">Mañana</button>
    <button id="turnoTarde" onclick="seleccionarTurno('tarde')">Tarde</button>
  </div>

  <h3>Monto</h3>
  <input type="number" id="montoIngreso" placeholder="Ej: 1500000"><br>

  <button class="verde" onclick="guardarIngreso()">Guardar ingreso</button>
</div>

<div id="pantallaGasto" class="pantalla">
  <h2>Nuevo gasto</h2>

  <label>Día</label><br>
  <input type="date" id="diaGasto"><br>

  <h3>Tipo de gasto</h3>
  <select id="categoriaGasto" onchange="actualizarOpcionesGasto()">
    <option>Sueldos</option>
    <option>Gastos mercadería</option>
    <option>Gastos operativos</option>
    <option>Gastos servicios</option>
    <option>Gastos administrativos</option>
    <option>Otros</option>
  </select>

  <h3>Detalle</h3>
  <select id="detalleGasto"></select>

  <h3>Monto</h3>
  <input type="number" id="montoGasto" placeholder="Ej: 180000"><br>

  <h3>Comentario opcional</h3>
  <input type="text" id="comentarioGasto" placeholder="Ej: adelanto, pago completo"><br>

  <button class="verde" onclick="guardarGasto()">Guardar gasto</button>
</div>

</div>

<div id="pantallaSaldo" class="pantalla">
  <h2>Modificar plata actual</h2>

  <label>Día</label><br>
  <input type="date" id="diaSaldo"><br>

  <h3>Nuevo saldo</h3>
  <input type="number" id="nuevoSaldo" placeholder="Ej: 2500000"><br>

  <button class="verde" onclick="guardarSaldo()">Guardar saldo</button>
</div>

<div style="text-align:center; padding:15px;">
  <button onclick="descargarExcel()">Descargar Excel</button>
  <button onclick="borrarTodo()">Borrar todo</button>
</div>

<table>
  <thead>
    <tr>
      <th>Día</th>
      <th>Movimiento</th>
      <th>Categoría</th>
      <th>Detalle</th>
      <th>Turno</th>
      <th>Monto</th>
      <th>Saldo luego</th>
<th>Deshacer</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>
  let movimientos = JSON.parse(localStorage.getItem("movimientos")) || [];
  let saldo = Number(localStorage.getItem("saldo")) || 0;

  let ingresoActual = "";
  let turnoActual = "";

  function formato(num){
    return Number(num).toLocaleString("es-AR");
  }

  function hoy(){
    return new Date().toISOString().split("T")[0];
  }

  function guardarDatos(){
    localStorage.setItem("movimientos", JSON.stringify(movimientos));
    localStorage.setItem("saldo", saldo);
  }

  function abrirPantalla(nombre){
    document.querySelectorAll(".pantalla").forEach(p => p.style.display = "none");

    if(nombre === "gasto"){
      document.getElementById("pantallaGasto").style.display = "block";
      document.getElementById("diaGasto").value = hoy();
      actualizarOpcionesGasto();
    }

    if(nombre === "saldo"){
      document.getElementById("pantallaSaldo").style.display = "block";
      document.getElementById("diaSaldo").value = hoy();
    }
  }

  function abrirIngreso(tipo){
    ingresoActual = tipo;
    turnoActual = "";

    document.querySelectorAll(".pantalla").forEach(p => p.style.display = "none");

    document.getElementById("pantallaIngreso").style.display = "block";
    document.getElementById("tituloIngreso").innerText = "Ingreso " + tipo;
    document.getElementById("diaIngreso").value = hoy();
    document.getElementById("montoIngreso").value = "";

    document.getElementById("turnoManana").classList.remove("seleccionado");
    document.getElementById("turnoTarde").classList.remove("seleccionado");
  }

  function seleccionarTurno(turno){
    turnoActual = turno;

    document.getElementById("turnoManana").classList.remove("seleccionado");
    document.getElementById("turnoTarde").classList.remove("seleccionado");

    if(turno === "mañana"){
      document.getElementById("turnoManana").classList.add("seleccionado");
    } else {
      document.getElementById("turnoTarde").classList.add("seleccionado");
    }
  }

  function guardarIngreso(){
    let dia = document.getElementById("diaIngreso").value;
    let monto = Number(document.getElementById("montoIngreso").value);

    if(!dia || !turnoActual || !monto){
      alert("Falta día, turno o monto");
      return;
    }

    saldo += monto;

    movimientos.push({
      dia: dia,
      movimiento: "Ingreso",
      categoria: ingresoActual,
      detalle: ingresoActual,
      turno: turnoActual,
      monto: monto,
      saldoLuego: saldo
    });

    guardarDatos();
    mostrarDatos();

    document.getElementById("montoIngreso").value = "";
  }

function actualizarOpcionesGasto(){
  let categoria = document.getElementById("categoriaGasto").value;
  let detalle = document.getElementById("detalleGasto");

  let opciones = [];

  if(categoria === "Sueldos"){
    opciones = [
      "Gera", "Mauro", "Ulices", "Ramiro", "Rocio", "Luicho",
      "Martincho", "Faby", "Flavia", "Oriana", "Alejandra",
      "Agustina", "Gisela", "Kiara", "Veronica", "Josue", "Otro"
    ];
  }

  if(categoria === "Gastos mercadería"){
    opciones = ["Gastos mercadería"];
  }

  if(categoria === "Gastos operativos"){
    opciones = [
      "Huevos", "Harinas", "Fabio", "Churros", "Calsa",
      "Pastas", "Bolsas", "Grasas", "Serenisima"
    ];
  }

  if(categoria === "Gastos servicios"){
    opciones = ["Gas", "Luz", "Internet", "Agua", "Limpieza"];
  }

  if(categoria === "Gastos administrativos"){
    opciones = ["Contadora", "Impuestos", "Obra social"];
  }

  if(categoria === "Otros"){
    opciones = ["Otro"];
  }

  detalle.innerHTML = "";

  opciones.forEach(opcion => {
    detalle.innerHTML += `<option>${opcion}</option>`;
  });
}

  function guardarGasto(){
    let dia = document.getElementById("diaGasto").value;
    let categoria = document.getElementById("categoriaGasto").value;
    let monto = Number(document.getElementById("montoGasto").value);
    let comentario = document.getElementById("comentarioGasto").value;
let detalle = document.getElementById("detalleGasto").value;

if(comentario){
  detalle = detalle + " - " + comentario;
}

    if(!dia || !monto){
      alert("Falta día o monto");
      return;
    }

    saldo -= monto;

    movimientos.push({
      dia: dia,
      movimiento: "Gasto",
      categoria: categoria,
      detalle: detalle,
      turno: "-",
      monto: monto,
      saldoLuego: saldo
    });

    guardarDatos();
    mostrarDatos();

    document.getElementById("montoGasto").value = "";
    document.getElementById("comentarioGasto").value = "";
  }

  function guardarSaldo(){
    let dia = document.getElementById("diaSaldo").value;
    let nuevoSaldo = Number(document.getElementById("nuevoSaldo").value);

    if(!dia && nuevoSaldo !== 0){
      alert("Faltan datos");
      return;
    }

    saldo = nuevoSaldo;

    movimientos.push({
      dia: dia,
      movimiento: "Modificación de saldo",
      categoria: "Saldo manual",
      detalle: "Plata actual modificada",
      turno: "-",
      monto: nuevoSaldo,
      saldoLuego: saldo
    });

    guardarDatos();
    mostrarDatos();
  }

 function mostrarDatos(){
  document.getElementById("saldoActual").innerText = formato(saldo);

  let totalCentral = 0;
  let totalSucursal = 0;
  let totalReparto = 0;
  let totalGastos = 0;

  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  movimientos.forEach((mov, index) => {
    if(mov.movimiento === "Ingreso" && mov.categoria === "Central") totalCentral += mov.monto;
    if(mov.movimiento === "Ingreso" && mov.categoria === "Sucursal") totalSucursal += mov.monto;
    if(mov.movimiento === "Ingreso" && mov.categoria === "Reparto") totalReparto += mov.monto;
    if(mov.movimiento === "Gasto") totalGastos += mov.monto;

    tabla.innerHTML += `
      <tr>
        <td>${mov.dia}</td>
        <td>${mov.movimiento}</td>
        <td>${mov.categoria}</td>
        <td>${mov.detalle}</td>
        <td>${mov.turno}</td>
        <td>$${formato(mov.monto)}</td>
        <td>$${formato(mov.saldoLuego)}</td>
        <td><button onclick="deshacerMovimiento(${index})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("totalCentral").innerText = formato(totalCentral);
  document.getElementById("totalSucursal").innerText = formato(totalSucursal);
  document.getElementById("totalReparto").innerText = formato(totalReparto);
  document.getElementById("totalGastos").innerText = formato(totalGastos);
  document.getElementById("totalBalance").innerText = formato(totalCentral + totalSucursal + totalReparto - totalGastos);
}

  function recalcularSaldo(){
  saldo = 0;

  movimientos.forEach(mov => {
    if(mov.movimiento === "Ingreso"){
      saldo += mov.monto;
    }

    if(mov.movimiento === "Gasto"){
      saldo -= mov.monto;
    }

    if(mov.movimiento === "Modificación de saldo"){
      saldo = mov.monto;
    }

    mov.saldoLuego = saldo;
  });
}

function deshacerMovimiento(index){
  if(confirm("¿Querés borrar este movimiento?")){
    movimientos.splice(index, 1);
    recalcularSaldo();
    guardarDatos();
    mostrarDatos();
  }
}
  function descargarExcel(){
    let csv = "Dia,Movimiento,Categoria,Detalle,Turno,Monto,Saldo luego\n";

    movimientos.forEach(mov => {
      csv += `${mov.dia},${mov.movimiento},${mov.categoria},${mov.detalle},${mov.turno},${mov.monto},${mov.saldoLuego}\n`;
    });

    let archivo = new Blob([csv], { type: "text/csv" });
    let url = URL.createObjectURL(archivo);

    let link = document.createElement("a");
    link.href = url;
    link.download = "finanzas-panaderia.csv";
    link.click();
  }

  function borrarTodo(){
    if(confirm("¿Seguro que querés borrar todo?")){
      movimientos = [];
      saldo = 0;
      guardarDatos();
      mostrarDatos();
    }
  }

  mostrarDatos();
</script>

</body>
</html>
