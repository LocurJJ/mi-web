<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resumen - Panadería Josué</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
      text-align:center;
    }

    header{
      background:white;
      padding:25px;
    }

    .card{
      background:white;
      margin:20px auto;
      padding:20px;
      width:90%;
      max-width:900px;
      border-radius:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td{
      border:1px solid #ccc;
      padding:10px;
    }

    th{
      background:#b7f000;
    }

    button{
      padding:15px 25px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#b7f000;
      font-weight:bold;
    }

    .barra{
      background:#7fa0c8;
      height:25px;
      margin:5px 0;
      border-radius:6px;
      color:white;
      text-align:left;
      padding-left:8px;
      line-height:25px;
    }
  </style>
</head>

<body>

<header>
  <h1>Resumen de Finanzas</h1>
  <a href="index.html"><button>Volver</button></a>
  <section class="card">
  <h2>Filtrar fechas</h2>

  <label>Desde</label>
  <input type="date" id="fechaDesde">

  <label>Hasta</label>
  <input type="date" id="fechaHasta">

  <br><br>

  <button onclick="aplicarFiltro()">Aplicar filtro</button>
  <button onclick="limpiarFiltro()">Ver todo</button>
</section>
</header>

<section class="card">
 <h2> INGRESOS</h2>
<h3>Resumen por día</h3>
  <table>
    <thead>
      <tr>
        <th>Día</th>
        <th>Central mañana</th>
        <th>Central tarde</th>
        <th>Sucursal mañana</th>
        <th>Sucursal tarde</th>
        <th>Reparto mañana</th>
        <th>Reparto tarde</th>
        <th>Total día</th>
      </tr>
    </thead>
    <tbody id="tablaResumen"></tbody>
  </table>
</section>

<section class="card">
  <h2> Gráfico de ingresos diarios</h2>
  <div id="grafico"></div>
</section>
<section class="card">
  <h2>GASTOS</h2>
<h3>Gastos por categoría</h3>
  <section class="card">
  <h2>⚖️ BALANCE</h2>
  <h3>Ingreso - Gastos por día</h3>
  <div id="graficoBalance"></div>
</section>
  <div id="graficoGastos"></div>
</section>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxUlFuZa-4AN3rdn_m2VIS2LpRkbh_Bp8",
  authDomain: "panaderia-finanzas.firebaseapp.com",
  databaseURL: "https://panaderia-finanzas-default-rtdb.firebaseio.com",
  projectId: "panaderia-finanzas",
  storageBucket: "panaderia-finanzas.appspot.com",
  messagingSenderId: "196371308937",
  appId: "1:196371308937:web:fd9f4b6470f6126d560158"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let todosLosMovimientos = [];
let fechaDesde = "";
let fechaHasta = "";

function formato(num){
  return Number(num).toLocaleString("es-AR");
}

onValue(ref(db, "finanzas"), (snapshot) => {
  let datos = snapshot.val();

  todosLosMovimientos = datos?.movimientos || [];

  procesarDatos(
    filtrarPorFecha(todosLosMovimientos)
  );
});

function procesarDatos(movimientos){

  let resumen = {};
let gastosPorCategoria = {};
  let balancePorDia = {};
  movimientos.forEach(mov => {
    let diaMovimiento = mov.dia;

if(!balancePorDia[diaMovimiento]){
  balancePorDia[diaMovimiento] = {
    ingresos: 0,
    gastos: 0
  };
}

if(mov.movimiento === "Ingreso"){
  balancePorDia[diaMovimiento].ingresos += Number(mov.monto);
}

if(mov.movimiento === "Gasto"){
  balancePorDia[diaMovimiento].gastos += Number(mov.monto);
}
    if(mov.movimiento === "Gasto"){
  let categoriaGasto = mov.categoria;
  let montoGasto = Number(mov.monto);

  if(!gastosPorCategoria[categoriaGasto]){
    gastosPorCategoria[categoriaGasto] = 0;
  }

  gastosPorCategoria[categoriaGasto] += montoGasto;
}
    if(mov.movimiento !== "Ingreso") return;

    let dia = mov.dia;
    let categoria = mov.categoria;
    let turno = mov.turno;
    let monto = Number(mov.monto);

    if(!resumen[dia]){
      resumen[dia] = {
        centralManana: 0,
        centralTarde: 0,
        sucursalManana: 0,
        sucursalTarde: 0,
        repartoManana: 0,
        repartoTarde: 0,
        total: 0
      };
    }

    if(categoria === "Central" && turno === "mañana") resumen[dia].centralManana += monto;
    if(categoria === "Central" && turno === "tarde") resumen[dia].centralTarde += monto;

    if(categoria === "Sucursal" && turno === "mañana") resumen[dia].sucursalManana += monto;
    if(categoria === "Sucursal" && turno === "tarde") resumen[dia].sucursalTarde += monto;

    if(categoria === "Reparto" && turno === "mañana") resumen[dia].repartoManana += monto;
    if(categoria === "Reparto" && turno === "tarde") resumen[dia].repartoTarde += monto;

    resumen[dia].total += monto;
  });

mostrarTabla(resumen);
mostrarGrafico(resumen);
mostrarGraficoGastos(gastosPorCategoria);
mostrarGraficoBalance(balancePorDia);
}
function filtrarPorFecha(movimientos){

  return movimientos.filter(mov => {

    if(fechaDesde && mov.dia < fechaDesde){
      return false;
    }

    if(fechaHasta && mov.dia > fechaHasta){
      return false;
    }

    return true;
  });

}

window.aplicarFiltro = function(){

  fechaDesde = document.getElementById("fechaDesde").value;
  fechaHasta = document.getElementById("fechaHasta").value;

  procesarDatos(
    filtrarPorFecha(todosLosMovimientos)
  );

}

window.limpiarFiltro = function(){

  fechaDesde = "";
  fechaHasta = "";

  document.getElementById("fechaDesde").value = "";
  document.getElementById("fechaHasta").value = "";

  procesarDatos(todosLosMovimientos);

}
function mostrarTabla(resumen){
  let tabla = document.getElementById("tablaResumen");
  tabla.innerHTML = "";

  Object.keys(resumen).forEach(dia => {
    let r = resumen[dia];

    tabla.innerHTML += `
      <tr>
        <td>${dia}</td>
        <td>$${formato(r.centralManana)}</td>
        <td>$${formato(r.centralTarde)}</td>
        <td>$${formato(r.sucursalManana)}</td>
        <td>$${formato(r.sucursalTarde)}</td>
        <td>$${formato(r.repartoManana)}</td>
        <td>$${formato(r.repartoTarde)}</td>
        <td><strong>$${formato(r.total)}</strong></td>
      </tr>
    `;
  });
}
  function mostrarGraficoGastos(gastosPorCategoria){
  let grafico = document.getElementById("graficoGastos");
  grafico.innerHTML = "";

  let maximo = 0;

  Object.keys(gastosPorCategoria).forEach(categoria => {
    if(gastosPorCategoria[categoria] > maximo){
      maximo = gastosPorCategoria[categoria];
    }
  });

  Object.keys(gastosPorCategoria).forEach(categoria => {
    let total = gastosPorCategoria[categoria];
    let ancho = maximo > 0 ? (total / maximo) * 100 : 0;

    grafico.innerHTML += `
      <p><strong>${categoria}</strong> - $${formato(total)}</p>
      <div class="barra" style="width:${ancho}%;">
        $${formato(total)}
      </div>
    `;
  });
}

function mostrarGrafico(resumen){
  let grafico = document.getElementById("grafico");
  grafico.innerHTML = "";

  let maximo = 0;

  Object.keys(resumen).forEach(dia => {
    if(resumen[dia].total > maximo){
      maximo = resumen[dia].total;
    }
  });

  Object.keys(resumen).forEach(dia => {
    let total = resumen[dia].total;
    let ancho = maximo > 0 ? (total / maximo) * 100 : 0;

    grafico.innerHTML += `
      <p><strong>${dia}</strong> - $${formato(total)}</p>
      <div class="barra" style="width:${ancho}%;">
        $${formato(total)}
      </div>
    `;
  });
}
function mostrarGraficoBalance(balancePorDia){
  let grafico = document.getElementById("graficoBalance");
  grafico.innerHTML = "";

  Object.keys(balancePorDia).forEach(dia => {
    let ingresos = balancePorDia[dia].ingresos;
    let gastos = balancePorDia[dia].gastos;
    let balance = ingresos - gastos;

    grafico.innerHTML += `
      <p>
        <strong>${dia}</strong> |
        Ingresos: $${formato(ingresos)} |
        Gastos: $${formato(gastos)} |
        Balance: <strong>$${formato(balance)}</strong>
      </p>
    `;
  });
}
</script>

</body>
</html>
